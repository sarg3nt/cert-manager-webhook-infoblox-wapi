name: Release Chart

# Publishes the Helm chart to the gh-pages branch using the canonical
# chart-releaser pattern: run on every push to main that changes charts/**.
# chart-releaser diffs each chart's version against existing GitHub releases and
# only publishes versions that don't yet have a release, so this is naturally
# idempotent. This replaces the previous `pull_request: closed` trigger, which
# fired on ANY PR close -- merged or not -- and published charts from unmerged
# branches (it once shipped a broken 3.0.1 chart from a closed release PR).
on:
  push:
    branches: ["main"]
    paths:
      - "charts/**"
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Don't cancel chart deployments

jobs:
  release-chart:
    name: Release Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        disable-sudo: true
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Configure Git
      run: |
        git config user.name "$GITHUB_ACTOR"
        git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

    - name: Install Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      env:
        GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

    # This will release the chart to the gh-pages branch. `skip_existing` makes
    # re-runs safe: if a chart's release/tag already exists it is skipped instead
    # of failing the job.
    - name: Run Chart-Releaser
      uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
      with: 
        mark_as_latest: false
        skip_existing: true
      env:
        CR_TOKEN: "${{ secrets.USER_PAT }}"
