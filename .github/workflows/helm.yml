name: Helm

on:
  push:
    branches: ["main"]
    paths:
      - "charts/**"
      - ".github/workflows/helm.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "charts/**"
      - ".github/workflows/helm.yml"
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Build a single-arch image to a local OCI tarball and hand it to the test
      # job as a workflow artifact. This keeps the image off the shared ghcr
      # package (no throwaway test-<run_id> tags) while still letting the kind
      # cluster load it via `kind load image-archive`.
      - name: Build Docker Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository }}:ci-test
          outputs: type=docker,dest=/tmp/webhook-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Image Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webhook-image
          path: /tmp/webhook-image.tar
          retention-days: 1


  lint:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            get.helm.sh:443
            github.com:443
            objects.githubusercontent.com:443

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Lint Helm Charts
        run: |
          for chart in charts/*/; do
            echo "Linting $chart"
            helm lint "$chart" --strict
          done

      - name: Template Helm Charts
        run: |
          for chart in charts/*/; do
            echo "Templating $chart"
            helm template test "$chart" --debug
          done

  test:
    name: Test Helm Charts
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: false
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Set Up Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: kind

      - name: Download Image Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: webhook-image
          path: /tmp

      - name: Load Docker Image Into Kind
        run: |
          # Load the OCI tarball built by the `build` job straight into Kind
          # (no registry round-trip, so nothing is pushed to ghcr).
          kind load image-archive /tmp/webhook-image.tar --name kind

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.19.2/cert-manager.yaml
          kubectl wait --for=condition=Available --timeout=300s -n cert-manager deployment/cert-manager
          kubectl wait --for=condition=Available --timeout=300s -n cert-manager deployment/cert-manager-webhook
          kubectl wait --for=condition=Available --timeout=300s -n cert-manager deployment/cert-manager-cainjector

      - name: Test Helm Chart Installation
        env:
          IMAGE_TAG: ci-test
        run: |
          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            echo "Testing installation of $chart_name"
            
            # Install without waiting for pod readiness (no Infoblox server available)
            helm install "test-$chart_name" "$chart" \
              --create-namespace \
              --namespace webhook-test \
              --set groupName=acme.example.com \
              --set image.repository=ghcr.io/${{ github.repository }} \
              --set image.tag=${IMAGE_TAG} \
              --set image.pullPolicy=IfNotPresent \
              --timeout 5m \
              --debug
            
            # Wait for certificates to be issued by cert-manager
            echo "Waiting for certificates to be ready..."
            kubectl wait --for=condition=Ready certificate --all -n webhook-test --timeout=3m || true
            
            # Verify resources were created
            echo "Verifying Kubernetes resources..."
            kubectl get all,certificate,issuer,secret -n webhook-test
            
            # Check if deployment was created (don't wait for ready since no Infoblox)
            kubectl get deployment -n webhook-test -o jsonpath='{.items[0].metadata.name}' | grep -q "cert-manager-webhook-infoblox-wapi"
            
            echo "✓ Helm chart installation successful (webhook pod won't be ready without Infoblox server)"
            
            # Cleanup for next chart
            helm uninstall "test-$chart_name" -n webhook-test
          done
